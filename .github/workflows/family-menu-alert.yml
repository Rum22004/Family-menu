name: Family Menu Daily Alert

on:
  schedule:
    # 3:00 PM Cambodia time = 8:00 AM UTC
    - cron: "0 8 * * *"

  workflow_dispatch:

jobs:
  send-alert:
    runs-on: ubuntu-latest

    steps:
      - name: Wake backend
        run: |
          echo "Waking backend..."
          curl -L \
            --retry 10 \
            --retry-delay 20 \
            --retry-all-errors \
            --max-time 300 \
            https://family-menu-1tva.onrender.com/

      - name: Wait for backend to stay awake
        run: sleep 20

      - name: Send Telegram alert
        run: |
          echo "Sending alert..."
          curl -L \
            --retry 10 \
            --retry-delay 20 \
            --retry-all-errors \
            --max-time 300 \
            https://family-menu-1tva.onrender.com/api/alert