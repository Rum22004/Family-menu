name: Family Menu Daily Alert

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  send-alert:
    runs-on: ubuntu-latest

    steps:
      - name: Wake backend
        run: |
          curl -L --retry 10 --retry-delay 20 --retry-all-errors --max-time 300 https://family-menu-m73p.onrender.com/

      - name: Wait
        run: sleep 20

      - name: Send Telegram alert
        run: |
          curl -L --retry 10 --retry-delay 20 --retry-all-errors --max-time 300 https://family-menu-m73p.onrender.com/api/alert